<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Menu</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cream: #faf6f0;
      --ink: #1a1410;
      --blush: #e8c4a0;
      --rose: #c4705a;
      --muted: #8a7a6e;
      --card-bg: #fff8f2;
      --border: #e8ddd4;
    }

    html, body {
      min-height: 100%;
      background: var(--cream);
      color: var(--ink);
      font-family: 'DM Sans', sans-serif;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 4rem 1.5rem;
      background-image:
        radial-gradient(ellipse at 20% 10%, rgba(196,112,90,0.07) 0%, transparent 55%),
        radial-gradient(ellipse at 80% 90%, rgba(232,196,160,0.12) 0%, transparent 55%);
    }

    /* ── Section ── */
    #menu {
      width: 100%;
      max-width: 860px;
      text-align: center;
    }

    .section-label {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.72rem;
      font-weight: 500;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--rose);
      margin-bottom: 1rem;
    }

    .section-title {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2rem, 5vw, 3.2rem);
      font-weight: 700;
      color: var(--ink);
      line-height: 1.15;
      margin-bottom: 3.5rem;
    }

    /* ── Grid ── */
    .menu-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1.25rem;
    }

    @media (max-width: 640px) {
      .menu-grid { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 400px) {
      .menu-grid { grid-template-columns: 1fr; }
    }

    /* ── Cards ── */
    .menu-card {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      padding: 1.8rem 1.5rem 1.5rem;
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 16px;
      text-decoration: none;
      color: var(--ink);
      overflow: hidden;
      transition: transform 0.28s ease, box-shadow 0.28s ease, border-color 0.28s ease;
    }

    .menu-card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(196,112,90,0.06) 0%, transparent 60%);
      opacity: 0;
      transition: opacity 0.28s ease;
      border-radius: inherit;
    }

    .menu-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 32px rgba(26,20,16,0.10);
      border-color: var(--blush);
    }

    .menu-card:hover::before { opacity: 1; }

    .menu-card-emoji {
      font-size: 1.75rem;
      margin-bottom: 1.1rem;
      display: block;
      transition: transform 0.28s ease;
    }

    .menu-card:hover .menu-card-emoji {
      transform: scale(1.15) rotate(-4deg);
    }

    .menu-card-num {
      font-family: 'Playfair Display', serif;
      font-size: 0.7rem;
      font-weight: 400;
      font-style: italic;
      color: var(--muted);
      letter-spacing: 0.06em;
      margin-bottom: 0.4rem;
    }

    .menu-card h3 {
      font-family: 'Playfair Display', serif;
      font-size: 1.05rem;
      font-weight: 700;
      line-height: 1.25;
      color: var(--ink);
    }


    /* ── Reveal animation ── */
    .reveal {
      opacity: 0;
      transform: translateY(22px);
      animation: fadeUp 0.7s ease forwards;
    }

    .section-label.reveal  { animation-delay: 0.05s; }
    .section-title.reveal  { animation-delay: 0.18s; }

    .menu-card.reveal:nth-child(1) { animation-delay: 0.30s; }
    .menu-card.reveal:nth-child(2) { animation-delay: 0.40s; }
    .menu-card.reveal:nth-child(3) { animation-delay: 0.50s; }
    .menu-card.reveal:nth-child(4) { animation-delay: 0.60s; }
    .menu-card.reveal:nth-child(5) { animation-delay: 0.70s; }
    .menu-card.reveal:nth-child(6) { animation-delay: 0.80s; }

    @keyframes fadeUp {
      to { opacity: 1; transform: translateY(0); }
    }
    .reasons-link p {
  font-family: 'Playfair Display', serif;
  font-style: italic;
  font-size: 1rem;
  color: var(--muted);
  text-align: center;
  margin-top: 24px;
}

.reasons-link p a {
  color: var(--rose);
  text-decoration: none;
  border-bottom: 1px solid var(--blush);
  transition: color 0.2s, border-color 0.2s;
}

.reasons-link p a:hover {
  color: var(--ink);
  border-color: var(--rose);
}
    
  </style>
</head>
<body>

  <section id="menu">
    <p class="section-label reveal">Inside this little world</p>
    <h2 class="section-title reveal">What's waiting for you</h2>
    <div class="menu-grid">
      <a href="memory.html" class="menu-card reveal">
        <span class="menu-card-emoji">📸</span>
        <div class="menu-card-num">01</div>
        <h3>Memory Lane</h3>
      </a>
      <a href="songs.html" class="menu-card reveal">
        <span class="menu-card-emoji">🎵</span>
        <div class="menu-card-num">02</div>
        <h3>Songs That Are You</h3>
      </a>
      <a href="vouchers.html" class="menu-card reveal">
        <span class="menu-card-emoji">🎟</span>
        <div class="menu-card-num">03</div>
        <h3>Gift Vouchers</h3>
      </a>
      <a href="dates.html" class="menu-card reveal">
        <span class="menu-card-emoji">📍</span>
        <div class="menu-card-num">04</div>
        <h3>A–Z Date Ideas</h3>
      </a>
      <a href="gifts.html" class="menu-card reveal">
        <span class="menu-card-emoji">🎁</span>
        <div class="menu-card-num">05</div>
        <h3>Birthday Gifts</h3>
      </a>
      <a href="note.html" class="menu-card reveal">
        <span class="menu-card-emoji">💌</span>
        <div class="menu-card-num">06</div>
        <h3>A Note for You</h3>
      </a>
    </div>
    <div class="reasons-link">
      <p>A million reasons why i love you but <a href="reasons.html">here's</a>  25</p>
    </div>
  </section>

</body>
</html>
